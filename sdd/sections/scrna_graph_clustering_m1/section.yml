schema_version: 0.1.0
section_id: scrna_graph_clustering_m1
domain: scrna
ecosystem: scverse
pack_refs:
- scrna.scverse.core
workflow_ref: bioinfo.sdd.workflow.section_default.v0
stage_ids:
- 08_neighbor_graph
- 09_embedding_visualization
- 10_clustering
task_refs:
- scrna.scverse.task.graph_clustering.v0
input_state:
- AnnData object with nonzero observations and variables.
- adata.obsm[representation_key] exists and has one row per observation.
- n_pcs is absent or does not exceed representation dimensions.
- Output graph, embedding, and cluster keys are absent unless overwrite is approved.
output_state:
- adata.uns[neighbors_key] records neighbor graph metadata.
- adata.obsp contains neighbors_key distances and connectivities matrices.
- adata.obsm[embedding_key] contains UMAP coordinates from the declared graph.
- adata.obs[cluster_key] contains Leiden graph-community labels.
- Provenance is written under adata.uns["bioinfo_skills"]["neighbors_umap_leiden"].
skill_refs:
- scrna.scverse.workflow.neighbor_graph
- scrna.scverse.workflow.embedding_visualization
- scrna.scverse.workflow.clustering
package_refs:
- scrna.scverse.package.scanpy
tool_refs:
- scrna.scverse.tool.scanpy_neighbors
- scrna.scverse.tool.scanpy_umap
- scrna.scverse.tool.scanpy_leiden
check_refs:
- section_schema
- section_catalog_links
- wrapper_binding
- adapter_binding
- section_artifacts
- installed_refs
- task_slots_filled
wrapper: wrappers/python/scanpy_neighbors_umap_leiden.py
adapter: workflow/rules/scrna_graph_clustering.smk
parameters:
  representation_key: X_pca
  neighbors_key: neighbors_x_pca
  embedding_key: X_umap_neighbors_x_pca
  cluster_key: leiden_neighbors_x_pca
  n_neighbors: 3
  n_pcs: 3
  metric: euclidean
  neighbors_method: umap
  umap_min_dist: 0.5
  umap_spread: 1.0
  resolution: 0.5
  random_state: 7
  leiden_flavor: leidenalg
  overwrite: false
expected_artifacts:
- output h5ad
- embedding TSV
- cluster-size JSON
- resolved-parameter JSON
- software-version JSON
- workflow log
- evidence report
claims:
  allowed:
  - Neighbor graph was constructed from the declared representation.
  - UMAP coordinates were computed from the declared graph.
  - Leiden graph communities were assigned under the recorded parameters.
  - Cluster-size summaries correspond to the declared cluster key.
  forbidden:
  - Cell type annotation.
  - Condition-level inference.
  - Normalization.
  - Feature selection.
  - PCA computation.
  - Final biological state interpretation.
gates:
  spec_review: approved
  plan_review: approved
  task_review: approved
  evidence_acceptance: pending
