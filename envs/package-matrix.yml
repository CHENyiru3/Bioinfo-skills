schema_version: "0.1.0"
matrix_id: bioinfo-skills.package_matrix
source_specs:
  - SPEC/environment_transferability_and_version_traceability.md
  - SPEC/seurat_r_package_support_plan.md
environment_groups:
  scverse_core:
    description: Python/scverse packages needed by approved Python wrappers.
    env_files:
      - envs/scverse-python.yml
  scverse_extra:
    description: Optional Python packages used by broader tutorials or advanced workflows.
    env_files:
      - envs/scverse-python-extra.txt
  r_seurat_core:
    description: Core R/Seurat runtime for object creation, preprocessing, dimensionality reduction, graph clustering, visualization, and marker ranking.
    env_files:
      - envs/r-seurat.yml
  r_seurat_performance:
    description: Recommended packages for scale, speed, and count-model performance.
    env_files:
      - envs/r-seurat.yml
  r_seurat_modalities:
    description: Optional packages for ATAC, spatial, multimodal, reference mapping, conversion, and method extensions.
    env_files:
      - envs/r-seurat-optional.yml
  r_notebook_docs:
    description: R notebook and rendered documentation tooling.
    env_files:
      - envs/r-seurat-notebook.yml
  r_tutorial_data:
    description: SeuratData and dataset packages used by tutorials; not part of the default runtime.
    env_files: []
packages:
  - id: scrna.scverse.package.scanpy
    package: scanpy
    import_name: scanpy
    language: python
    ecosystem: scverse
    package_ref: tool_market/packages/scrna/scverse/scanpy.md
    skill_refs:
      - skills/scrna/scverse/SKILL.md
    env_groups:
      - scverse_core
    conda_package: scanpy
    source_urls:
      - https://scanpy.readthedocs.io/en/stable/
    desired_version: null
    runtime_probe: "python -c 'import scanpy; print(scanpy.__version__)'"
    status: active
  - id: scrna.seurat.package.seurat
    package: Seurat
    import_name: Seurat
    language: r
    ecosystem: seurat
    package_ref: tool_market/packages/scrna/seurat/seurat.md
    skill_refs:
      - skills/scrna/seurat/SKILL.md
    env_groups:
      - r_seurat_core
    conda_package: r-seurat
    cran_package: Seurat
    source_urls:
      - https://satijalab.org/seurat/
      - https://cran.r-project.org/package=Seurat
    source_version_policy: "local mirror label 5.4.0; runtime may be newer"
    desired_version: null
    runtime_probe: "library(Seurat); packageVersion('Seurat')"
    status: active
  - id: scrna.seurat.package.seuratobject
    package: SeuratObject
    import_name: SeuratObject
    language: r
    ecosystem: seurat
    package_ref: tool_market/packages/scrna/seurat/seuratobject.md
    skill_refs:
      - skills/scrna/seurat/SKILL.md
    env_groups:
      - r_seurat_core
    conda_package: r-seuratobject
    cran_package: SeuratObject
    source_urls:
      - https://satijalab.github.io/seurat-object/
    runtime_probe: "library(SeuratObject); packageVersion('SeuratObject')"
    status: active
  - id: scrna.seurat.package.sctransform
    package: sctransform
    import_name: sctransform
    language: r
    ecosystem: seurat
    package_ref: tool_market/packages/scrna/seurat/sctransform.md
    skill_refs:
      - skills/scrna/seurat/workflow/04_normalization_transform/SKILL.md
    env_groups:
      - r_seurat_core
    conda_package: r-sctransform
    cran_package: sctransform
    source_urls:
      - https://satijalab.org/seurat/articles/sctransform_vignette.html
    runtime_probe: "library(sctransform); packageVersion('sctransform')"
    status: active
  - id: scrna.seurat.package.bpcells
